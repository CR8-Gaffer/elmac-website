name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      # GitHub Pages intermittently returns "Deployment failed, try again
      # later" (twice on 5 Jul 2026, build green both times). First attempt is
      # allowed to fail; a second attempt runs after a pause. If both fail,
      # the job fails for real.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Pause before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
